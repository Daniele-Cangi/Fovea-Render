<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoveaRender — WebRTC Dual Stream</title>
    <style>
      body { margin:0; background:#000; color:#0ff; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .wrap { display:flex; gap:12px; padding:12px; }
      .col { display:flex; flex-direction:column; gap:10px; }
      .card { border:1px solid rgba(0,255,255,0.2); border-radius:10px; padding:10px; }
      .row { display:flex; gap:10px; align-items:center; }
      canvas { background:#000; border-radius:10px; border:1px solid rgba(0,255,255,0.2); }
      .tiny { font-size:12px; color:rgba(0,255,255,0.85); line-height:1.35; white-space:pre; }
      .title { font-weight:700; letter-spacing:1px; }
      .hint { color:rgba(0,255,255,0.65); font-size:12px; }
      video { display:none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="col">
        <div class="card">
          <div class="title">SENDER (LOCAL)</div>
          <div class="hint">C = calibrate (3×3). L = toggle LOD. Eye-tracking uses webcam; fallback mouse.</div>
        </div>
        <div class="row">
          <div class="col">
            <div class="hint">LOW stream (downscaled)</div>
            <canvas id="cLow"></canvas>
          </div>
          <div class="col">
            <div class="hint">PATCH stream (fovea crop)</div>
            <canvas id="cPatch"></canvas>
          </div>
        </div>
        <div class="card tiny" id="senderStats">…</div>
      </div>

      <div class="col">
        <div class="card">
          <div class="title">RECEIVER (REMOTE COMPOSITE)</div>
          <div class="hint">Recomposed from two incoming tracks + metadata over DataChannel.</div>
        </div>
        <canvas id="cOut"></canvas>
        <div class="card tiny" id="recvStats">…</div>
      </div>
    </div>

    <!-- hidden video sinks for remote tracks -->
    <video id="vLow" playsinline muted></video>
    <video id="vPatch" playsinline muted></video>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
